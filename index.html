<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrega Fácil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-blue-600">

    <!-- TELA DE SELEÇÃO (ID: tela-inicio) -->
    <div id="tela-inicio" class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <h1 class="text-2xl font-bold mb-6 text-gray-800">Entrega Fácil</h1>
            <button onclick="mudarPara('vendedor')" class="w-full mb-3 bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">Sou Vendedor</button>
            <button onclick="mudarPara('comprador')" class="w-full border-2 border-blue-600 text-blue-600 py-4 rounded-xl font-bold hover:bg-blue-50">Sou Comprador</button>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL (ID: app) -->
    <div id="app" class="hidden min-h-screen bg-gray-100">
        <header class="bg-white p-4 shadow flex justify-between items-center">
            <b class="text-blue-600">Entrega Fácil</b>
            <button onclick="location.reload()" class="text-xs bg-gray-200 px-2 py-1 rounded">Sair</button>
        </header>

        <!-- CONTEÚDO VENDEDOR -->
        <div id="view-vendedor" class="p-4 hidden">
            <h2 class="font-bold mb-4">Painel do Vendedor</h2>
            <div class="bg-white p-4 rounded-xl shadow">
                <input id="inp-nome" placeholder="Produto" class="w-full border p-2 mb-2 rounded">
                <input id="inp-preco" type="number" placeholder="Preço R$" class="w-full border p-2 mb-4 rounded">
                <button onclick="salvarProduto()" class="w-full bg-green-500 text-white py-2 rounded font-bold">Postar Anúncio</button>
            </div>
            <div id="meus-itens" class="mt-4 space-y-2"></div>
        </div>

        <!-- CONTEÚDO COMPRADOR -->
        <div id="view-comprador" class="p-4 hidden">
            <h2 class="font-bold mb-4">Vitrine do Prédio</h2>
            <div id="vitrine" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <script>
        // Banco de dados temporário
        let produtos = [
            { nome: "Bolo de Pote", preco: 12, autor: "Apto 22" },
            { nome: "Pizza Caseira", preco: 45, autor: "Apto 54" }
        ];

        function mudarPara(perfil) {
            // Esconde a tela azul
            document.getElementById('tela-inicio').classList.add('hidden');
            // Mostra o fundo cinza
            document.getElementById('app').classList.remove('hidden');
            // Remove a cor azul do fundo do body
            document.body.classList.remove('bg-blue-600');

            if(perfil === 'vendedor') {
                document.getElementById('view-vendedor').classList.remove('hidden');
                atualizarListaVendedor();
            } else {
                document.getElementById('view-comprador').classList.remove('hidden');
                atualizarVitrine();
            }
        }

        function salvarProduto() {
            const n = document.getElementById('inp-nome').value;
            const p = document.getElementById('inp-preco').value;
            if(!n || !p) return alert("Preencha os campos!");
            
            produtos.push({ nome: n, preco: p, autor: "Meu Apto" });
            alert("Sucesso!");
            document.getElementById('inp-nome').value = "";
            document.getElementById('inp-preco').value = "";
            atualizarListaVendedor();
        }

        function atualizarListaVendedor() {
            const div = document.getElementById('meus-itens');
            div.innerHTML = produtos.filter(x => x.autor === "Meu Apto").map(x => `
                <div class="bg-white p-3 rounded border font-medium">${x.nome} - R$ ${x.preco}</div>
            `).join('');
        }

        function atualizarVitrine() {
            const div = document.getElementById('vitrine');
            div.innerHTML = produtos.map(x => `
                <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center">
                    <div>
                        <div class="text-xs text-blue-500 font-bold">${x.autor}</div>
                        <div class="font-bold text-lg">${x.nome}</div>
                        <div class="text-xl font-bold text-gray-800">R$ ${x.preco}</div>
                    </div>
                    <button class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">Comprar</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
