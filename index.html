<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste Entrega Facil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200">

    <!-- TELA DE ESCOLHA -->
    <div id="tela_selecao" style="display: block;" class="fixed inset-0 bg-blue-600 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl text-center">
            <h1 class="text-2xl font-bold mb-6">Entrega Fácil</h1>
            <button onclick="entrar('vendedor')" class="w-full bg-blue-600 text-white p-4 rounded mb-2 font-bold">ENTRAR COMO VENDEDOR</button>
            <button onclick="entrar('comprador')" class="w-full border-2 border-blue-600 text-blue-600 p-4 rounded font-bold">ENTRAR COMO COMPRADOR</button>
        </div>
    </div>

    <!-- TELA DO APP -->
    <div id="tela_app" style="display: none;" class="p-4">
        <div class="bg-white p-4 rounded shadow flex justify-between mb-4">
            <span id="txt_perfil" class="font-bold uppercase text-blue-600"></span>
            <button onclick="location.reload()" class="text-red-500">Sair</button>
        </div>

        <!-- AREA VENDEDOR -->
        <div id="area_vendedor" style="display: none;">
            <div class="bg-white p-4 rounded shadow">
                <h2 class="font-bold mb-2">Novo Produto</h2>
                <input id="n" placeholder="Nome" class="border p-2 w-full mb-2">
                <input id="p" placeholder="Preço" type="number" class="border p-2 w-full mb-2">
                <button onclick="add()" class="w-full bg-green-500 text-white p-2 rounded">CADASTRAR</button>
            </div>
        </div>

        <!-- AREA COMPRADOR -->
        <div id="area_comprador" style="display: none;">
            <h2 class="font-bold mb-4">Vitrine de Vizinhos</h2>
            <div id="vitrine" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // Teste de carregamento
        console.log("Sistema pronto!");

        let dados = [
            {nome: "Bolo", preco: 10, dono: "Apto 10"},
            {nome: "Suco", preco: 5, dono: "Apto 20"}
        ];

        function entrar(tipo) {
            // Esconde seleção, mostra app
            document.getElementById('tela_selecao').style.display = 'none';
            document.getElementById('tela_app').style.display = 'block';
            document.getElementById('txt_perfil').innerText = "Perfil: " + tipo;

            if(tipo === 'vendedor') {
                document.getElementById('area_vendedor').style.display = 'block';
                document.getElementById('area_comprador').style.display = 'none';
            } else {
                document.getElementById('area_comprador').style.display = 'block';
                document.getElementById('area_vendedor').style.display = 'none';
                mostrarVitrine();
            }
        }

        function add() {
            let nome = document.getElementById('n').value;
            let preco = document.getElementById('p').value;
            if(!nome || !preco) return alert("Preencha os campos");
            
            dados.push({nome: nome, preco: preco, dono: "Meu Apto"});
            alert("Produto cadastrado com sucesso!");
            document.getElementById('n').value = "";
            document.getElementById('p').value = "";
        }

        function mostrarVitrine() {
            let lista = document.getElementById('vitrine');
            lista.innerHTML = "";
            dados.forEach(item => {
                lista.innerHTML += `
                    <div class="bg-white p-4 rounded shadow flex justify-between items-center">
                        <div>
                            <b>${item.nome}</b><br>R$ ${item.preco} 
                            <small class="block text-gray-400">${item.dono}</small>
                        </div>
                        <button class="bg-blue-600 text-white px-3 py-1 rounded">Comprar</button>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
